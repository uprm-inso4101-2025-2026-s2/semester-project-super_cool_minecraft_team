            const values = rawData.issueNumbers.map(issueNum => {
                const vals = selectedDevsArray

                    .filter(v => v !== undefined && v !== null);

                if (aggregation === 'sum') return vals.reduce((a, b) => a + b, 0);

                : `Average of ${selectedDevsArray.length} dev(s)`;

                data: values,

                pointRadius: 4,
                pointHoverRadius: 6,
